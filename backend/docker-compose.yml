services:
  api:
    build: .
    restart: unless-stopped
    environment:
      # ↓↓↓ 你的前端域名（CORS 放行用，结尾不要带斜杠）
      - FRONTEND_URL=https://video.kimixyz.com
      - PORT=7860
    expose:
      - "7860"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # ↓↓↓ 后端要用的子域名（自己定一个，DNS 指向这台 VM）
      - BACKEND_DOMAIN=api.kimixyz.com
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
